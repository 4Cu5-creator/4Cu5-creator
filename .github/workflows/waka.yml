name: Update WakaTime Stats SVG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch WakaTime SVG
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p wakatime
          BASE="https://wakatime-readme-stats.vercel.app/api/wakatimeStats"
          PARAMS="username=Sastisfied&api_key=$WAKATIME_API_KEY&github_token=$GITHUB_TOKEN"
          PARAMS="$PARAMS&theme=magenta&components=2"
          PARAMS="$PARAMS&component1_type=all_langs&component1_chart_type=bar&component1_chart_color=ff00ff"
          PARAMS="$PARAMS&component2_type=heatmap&component2_heatmap_color=ff00ff"
          curl -fsSL "${BASE}?${PARAMS}" -o wakatime/stats.svg
          # Patch fetched SVG to match cosmic theme
          sed -i \
            -e 's/fill="#f8f6f3"/fill="#000000"/g' \
            -e 's/stroke="#dcd7ce"/stroke="#9D4EDD"/g' \
            -e 's/style="color:#7a7266"/style="color:#E879F9"/g' \
            -e 's/fill="#2d2a26"/fill="#E879F9"/g' \
            -e 's/fill="#5f574f"/fill="#C4B5FD"/g' \
            -e 's/stroke="#5f574f"/stroke="#3D1A5C"/g' \
            wakatime/stats.svg

      - name: Bump README cache-buster
        run: |
          set -euo pipefail
          V="$(date -u +%Y%m%d)"
          sed -i -E "s#(wakatime/stats\.svg)(\?v=[0-9]+)?([\"'])#\1?v=$V\3#g" README.md

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wakatime/stats.svg README.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update WakaTime stats (v=$(date -u +%Y%m%d))"
          git push
