name: Update WakaTime Stats SVG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch WakaTime SVG
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p wakatime
          BASE="https://wakatime-readme-stats.vercel.app/api/wakatimeStats"
          PARAMS="username=Sastisfied&api_key=$WAKATIME_API_KEY&github_token=$GITHUB_TOKEN"
          PARAMS="$PARAMS&bg_color=000000&border_color=9D4EDD&logo_color=E879F9&title_color=E879F9&text_color=C4B5FD"
          PARAMS="$PARAMS&components=3"
          PARAMS="$PARAMS&component1_type=all_langs&component1_chart_type=donut&component1_chart_color=ff00ff"
          PARAMS="$PARAMS&component2_type=heatmap&component2_heatmap_color=ff00ff"
          PARAMS="$PARAMS&component3_type=rank"
          curl -fsSL "${BASE}?${PARAMS}" -o wakatime/stats.svg

      - name: Bump README cache-buster
        run: |
          set -euo pipefail
          V="$(date -u +%Y%m%d)"
          sed -i -E "s#(wakatime/stats\.svg)(\?v=[0-9]+)?([\"'])#\1?v=$V\3#g" README.md

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wakatime/stats.svg README.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update WakaTime stats (v=$(date -u +%Y%m%d))"
          git push
